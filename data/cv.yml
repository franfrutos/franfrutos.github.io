# =============================================================================
# CV content for Francisco Garre-Frutos.
# Consumed by scripts/build-cv.mjs together with data/papers.yml (publications).
# Edit this file to update the CV (PDF + on-site HTML page). Publications are
# NOT listed here — they come from papers.yml so the site and CV stay in sync.
#
# Most sections are lists of "entries" with this shape (all keys optional):
#   - title:  bold heading (left)
#     right:  italic meta, top-right (location / amount / ECTS …)
#     org:    small uppercase line under the title
#     dates:  italic meta, second row right
#     body:   a paragraph of prose
#     fields: [[label, value], …]  → rendered as "Label: value" lines
# Wrap a value in *asterisks* to italicise it (e.g. a thesis or project title).
# =============================================================================

