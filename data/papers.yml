# Research threads (the 3 sections) and publications.
# To add a paper: copy a block under `papers:` and set `thread` to a thread id above.
# Coordinates not needed. Optional: url, tags, slug, osf, keywords, abstract, bibtex, ris.

threads:
  - id: learning
    num: "01"
    short: Learning & attention
    title: (Implicit) learning & attention
    blurb: Our ability to process information is deeply intertwined with our experience of the world. In this section, I present some of my work showing how learning shapes attention, and its boundary conditions.
  - id: distraction
    num: "02"
    short: Distraction & capture
    title: Distraction & attentional capture
    blurb: How do we cope with irrelevant information? In this section, I present some of my work on the factors that determine when a salient distractor captures attention despite our goals — and when it does not.
  - id: validity
    num: "03"
    short: Validity
    title: Validity
    blurb: Do we measure what we think we are measuring? Are our measures — and the inferences we draw from them — reliable enough? In this section, you can find some of my work on validity.

papers:
  - thread: learning
    year: 2026
    title: Explicit knowledge modulates Pavlovian attentional biases
    authors: Garre-Frutos, F.†, Martínez-López, P.†, Ariza, A., Rey-Sáez, R., Luque, D., Vadillo, M. A., & González, F.
    venue: PsyArXiv
    preprint: true
    url: https://doi.org/10.31234/osf.io/uwge3
    tags: [VMAC, awareness, Pavlovian]
    keywords: [selective attention, reward learning, reversal learning, explicit knowledge, associative learning]
    osf:
      prereg: https://osf.io/g96yj
      materials: https://osf.io/xzs9f/
      data: https://osf.io/xzs9f/
      code: https://osf.io/xzs9f/
      # preprint → PsyArXiv "Preprint" badge automatically (no oa needed)
    abstract: >-
      There is plenty of evidence showing that the history of stimulus-reward pairings can cause such stimuli to capture our attention more easily, even when attending to them actually prevents the delivery of a reward. Once established, these Pavlovian attentional biases are believed to operate automatically and persist even when they no longer predict a reward. This reflects an inflexible form of attentional sign-tracking. In this study, we investigated how reversal learning of Pavlovian attentional biases is affected by explicit knowledge. Across three experiments, we demonstrate that verbal instructions alone can modulate previously learned attentional biases (Experiments 1 and 2a) and that, when not informed of the reversal, participants still exhibit strong associations between Pavlovian attentional biases and individual differences in awareness of the new, reversed contingencies (Experiment 2b). Computational modelling of a previously published dataset reveals that instructions may prompt a rapid model-based revaluation by eliciting the automatic updating of the stimuli's value representation. However, such updating can be counterproductive, as attending to the previously high-value distractor reduces the likelihood of receiving a reward when contingencies are re-evaluated. These findings emphasize the importance of explicit knowledge in the updating process.
  - thread: learning
    year: 2025
    title: Value-modulated attentional capture depends on awareness
    authors: Garre-Frutos, F., Lupiáñez, J., & Vadillo, M. A.
    venue: Psychonomic Bulletin & Review
    volume: 32
    issue: 6
    pages: 3025–3040
    url: https://doi.org/10.3758/s13423-025-02734-1
    slug: vmac-awareness
    osf:
      materials: https://github.com/franfrutos/VMAC_awareness/tree/main/Materials
      data: https://github.com/franfrutos/VMAC_awareness/tree/main/Input
      code: https://github.com/franfrutos/VMAC_awareness/tree/main/Scripts
      oa: https://link.springer.com/article/10.3758/s13423-025-02734-1
    tags: [VMAC, awareness]
    keywords: [Attention, Awareness, Capture, Learning, Reward]
    abstract: >-
      Value-modulated attentional capture (VMAC) refers to a process by which a priori neutral stimuli gain attentional priority when associated with reward, independently of goal or stimulus-driven attentional control. Although VMAC is considered an automatic and implicit process, the role of awareness of the stimulus–reward contingency on its learning process remains unclear at best. In a well-powered replication of a previous study, we found that VMAC is absent when participants are not explicitly informed about the stimulus–reward contingency in the pre-task instructions. In a second experiment, we show that when instructions are manipulated between groups, only the instructed group shows VMAC. Interestingly, although the no-instruction group did not show VMAC at the group level, participants who became aware of the stimulus–reward contingencies did nevertheless show robust VMAC at the end of the task. Meta-analytic evidence further supports our conclusion by showing that studies that include instructions about the stimulus–reward contingencies yield significantly larger VMAC effects. Taken collectively, these findings suggest that the learning process behind VMAC may not be entirely implicit.
