title: FGF CV
author: Francisco Garre-Frutos
version: 1.0.0
quarto-required: ">=1.4.0"
contributes:
  formats:
    common:
      # IBM Plex Mono is bundled in fonts/ so the PDF is fully reproducible
      # without relying on a system font install.
      font-paths:
        - fonts
    typst:
      template-partials:
        - typst-template.typ
        - typst-show.typ
      mainfont: "IBM Plex Mono"
