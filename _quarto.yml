project:
  type: website
  output-dir: _site
  pre-render:
    - node scripts/build-meta.mjs
    - node scripts/build-data.mjs
    - node scripts/geocode-cities.mjs
    - node scripts/build-og.mjs
    - node scripts/build-papers.mjs
    - node scripts/build-cv.mjs
    - node scripts/stamp-scripts.mjs
  post-render:
    - node scripts/build-cv-dark.mjs
  resources:
    - assets/**
    - CNAME              # custom domain for GitHub Pages (copied into _site/CNAME each deploy)
    - google8e1efdef24f8244c.html   # Google Search Console verification for franfrutos.github.io

website:
  title: "Francisco Garre-Frutos, PhD"
  favicon: assets/favicon.svg
  site-url: "https://fgarrefrutos.com"
  # Native Open Graph + Twitter cards; per-page title/description/image (front
  # matter) drive them. Extra og/JSON-LD lives in _includes/head.html (build-meta).
  open-graph: true
  twitter-card:
    card-style: summary_large_image
    creator: "@Fran_gfr"

format:
  html:
    theme: theme.scss
    page-layout: full
    toc: false
    anchor-sections: false
    section-divs: true
    link-external-newwindow: true
    include-in-header:
      - _includes/head.html
    include-after-body:
      - _includes/scripts.html
